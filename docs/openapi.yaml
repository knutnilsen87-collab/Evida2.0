      type: object
      required: [action_type, label, requires_approval, may_change_data]
      properties:
        action_type:
          type: string
          enum: [explain_this, show_me_how, do_it_with_me, check_my_work, why_blocked, what_next, legal_work_help]
        label: { type: string }
        requires_approval: { type: boolean }
        may_change_data: { type: boolean }
        steps:
          type: array
          items:
            type: object
            properties:
