        mode:
          type: string
          enum: [product_help, explain_this, show_me_how, do_it_with_me, check_my_work, why_blocked, what_next, legal_work_help]
        answer_level:
          type: string
          enum: [short, simple, step_by_step, guided, advanced, audit]
        detected_intent: { type: string }
        topic_fingerprint: { type: string }
        is_semantic_repeat: { type: boolean }
