version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: advokat_ai_postgres
    environment:
      POSTGRES_USER: advokat_ai
      POSTGRES_PASSWORD: advokat_ai
      POSTGRES_DB: advokat_ai
    ports:
      - "5432:5432"
    volumes:
      - advokat_ai_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: advokat_ai_redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: advokat_ai_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - advokat_ai_minio:/data

volumes:
  advokat_ai_pgdata:
  advokat_ai_minio:
